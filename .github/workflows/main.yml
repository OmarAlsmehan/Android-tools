name: download-ndk

on:
  workflow_dispatch:

jobs:
  download:
    runs-on: ubuntu-latest
    steps:
      - name: Download NDK
        run: |
          wget https://dl.google.com/android/repository/android-ndk-r17c-linux-x86_64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ndk-r17c
          path: android-ndk-r17c-linux-x86_64.zip
